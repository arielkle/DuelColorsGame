<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דו-קרב צבעים - תחרות כיתתית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- Firebase Config ---
        const manualConfig = {
            apiKey: "AIzaSyDRSCnbVmvUo4tBO6ylft6uawtGJNKi2aM",
            authDomain: "colorduelgame.firebaseapp.com",
            projectId: "colorduelgame",
            storageBucket: "colorduelgame.firebasestorage.app",
            messagingSenderId: "818116570619",
            appId: "1:818116570619:web:73b15fb2114fad191eef5e"
        };

        const firebaseConfig = manualConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'color-duel-v2';
        
        let app, db, auth, user = null;
        let teacherCode = '';
        let playerName = ''; 
        let gameMode = null; 
        let currentRoomId = null;
        let roomLimit = 0;
        let score = 0;
        let timerInterval = null;
        let gameActive = false;
        let roomUnsubscribe = null;

        const animalEmojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🦉', '🦄', '🐝'];

        const initFirebase = async () => {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            try {
                const result = await signInAnonymously(auth);
                user = result.user;
            } catch (error) {
                console.error("Auth Failed:", error);
                showToast("נכשלה התחברות לשרת.");
            }
        };

        initFirebase();

        // --- Core Simon Logic ---
        const colors = ['green', 'red', 'yellow', 'blue'];
        let gameSequence = [];
        let userSequence = [];
        let isPlayingSequence = false;
        let canClick = false;

        const frequencies = { green: 261.63, red: 329.63, yellow: 392.00, blue: 523.25 };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(color) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(frequencies[color], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        window.flashPad = (color) => {
            const pad = document.getElementById(color);
            if (!pad) return;
            pad.classList.add('brightness-150', 'scale-95');
            playSound(color);
            setTimeout(() => pad.classList.remove('brightness-150', 'scale-95'), 300);
        };

        async function playSequence() {
            if (!gameActive) return;
            isPlayingSequence = true;
            canClick = false;
            updateGameMsg("הקשב לרצף...");
            for (const color of gameSequence) {
                await new Promise(r => setTimeout(r, 600));
                if (!gameActive) return; 
                flashPad(color);
            }
            isPlayingSequence = false;
            canClick = true;
            updateGameMsg("תורך!");
        }

        window.handlePadClick = (color) => {
            if (!canClick || isPlayingSequence || !gameActive) return;
            flashPad(color);
            userSequence.push(color);
            const idx = userSequence.length - 1;
            
            if (userSequence[idx] !== gameSequence[idx]) {
                if (gameMode === 'single') {
                    gameActive = false;
                    updateGameMsg("טעית!");
                    setTimeout(finishGame, 1000);
                } else {
                    userSequence = [];
                    gameSequence = [];
                    updateGameMsg("טעות! רצף חדש");
                    setTimeout(nextStep, 1000);
                }
                return;
            }

            if (userSequence.length === gameSequence.length) {
                score++;
                document.getElementById('score-val').innerText = score;
                if (gameMode === 'group') syncScore();
                canClick = false;
                setTimeout(nextStep, 800);
            }
        };

        function nextStep() {
            if (!gameActive) return;
            userSequence = [];
            gameSequence.push(colors[Math.floor(Math.random() * 4)]);
            playSequence();
        }

        // --- Navigation & Cleanup ---
        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.startSetup = (mode) => {
            gameMode = mode;
            document.getElementById('mode-title').innerText = mode === 'single' ? 'אימון אישי' : 'תחרות קבוצתית';
            document.getElementById('group-config').classList.toggle('hidden', mode === 'single');
            const grid = document.getElementById('emoji-grid');
            grid.innerHTML = animalEmojis.map(emoji => `
                <button onclick="selectEmoji('${emoji}')" class="emoji-btn text-3xl p-2 rounded-xl border-2 border-transparent hover:bg-white/10 transition">
                    ${emoji}
                </button>
            `).join('');
            showScreen('setup-screen');
        };

        window.selectEmoji = (emoji) => {
            playerName = emoji;
            document.querySelectorAll('.emoji-btn').forEach(btn => {
                btn.classList.toggle('border-emerald-500', btn.innerText === emoji);
                btn.classList.toggle('bg-emerald-500/20', btn.innerText === emoji);
            });
        };

        window.validateAndProceed = async () => {
            teacherCode = document.getElementById('teacher-input').value.trim().toUpperCase();
            if (!teacherCode || !playerName) {
                showToast("נא לבחור חיה ולהזין קוד מורה");
                return;
            }
            if (!user) {
                showToast("מתחבר לשרת...");
                return;
            }

            if (gameMode === 'single') {
                startGameUI();
                startSingleGame();
            } else {
                roomLimit = parseInt(document.getElementById('participant-select').value);
                showScreen('rooms-screen');
                loadRooms(); 
            }
        };

        function startGameUI() {
            showScreen('game-screen');
            document.getElementById('timer-container').style.visibility = (gameMode === 'single') ? 'hidden' : 'visible';
            document.getElementById('side-scores').classList.toggle('hidden', gameMode === 'single');
            document.getElementById('p-name-disp').innerText = playerName;
        }

        // פונקציית עזיבת חדר שפועלת מבלי לרענן את כל הדף
        async function leaveCurrentRoomSilent() {
            if (gameMode !== 'group' || !currentRoomId || !db || !user) return;
            
            if (timerInterval) clearInterval(timerInterval);
            gameActive = false;

            const roomsCol = `teacher_${teacherCode}_rooms`;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', roomsCol, currentRoomId);
            
            try {
                const docSnap = await getDoc(roomRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const updatedPlayers = (data.players || []).filter(p => p.uid !== user.uid);
                    
                    if (updatedPlayers.length === 0) {
                        await setDoc(roomRef, { status: 'empty', players: [], limit: data.limit });
                    } else {
                        // אם המשחק נגמר ומישהו עוזב, החדר חוזר למצב פנוי אם יש מקום
                        const newStatus = (updatedPlayers.length < data.limit) ? 'waiting' : data.status;
                        await updateDoc(roomRef, { 
                            players: updatedPlayers, 
                            status: newStatus 
                        });
                    }
                }
            } catch (e) { console.error("Error leaving room:", e); }
            
            if (roomUnsubscribe) {
                roomUnsubscribe();
                roomUnsubscribe = null;
            }
            currentRoomId = null;
        }

        function loadRooms() {
            if (!db || !user) return;
            renderRooms({});
            const roomsCol = `teacher_${teacherCode}_rooms`;
            const q = collection(db, 'artifacts', appId, 'public', 'data', roomsCol);
            onSnapshot(q, (snapshot) => {
                const roomData = {};
                snapshot.forEach(doc => roomData[doc.id] = doc.data());
                renderRooms(roomData);
            });
        }

        function renderRooms(roomData) {
            const container = document.getElementById('rooms-grid');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const id = `room_${i}`;
                const data = roomData[id] || { status: 'empty', players: [] };
                let btnClass = "bg-emerald-600 hover:bg-emerald-500";
                let statusText = "פנוי";
                let disabled = false;
                
                if (data.status === 'playing') {
                    btnClass = "bg-gray-700 cursor-not-allowed";
                    statusText = "בפעילות";
                    disabled = true;
                } else if (data.players && data.players.length >= data.limit) {
                    btnClass = "bg-red-900/50 cursor-not-allowed";
                    statusText = "חדר מלא";
                    disabled = true;
                } else if (data.status === 'waiting') {
                    btnClass = "bg-amber-600 animate-pulse";
                    statusText = `ממתין (${data.players.length}/${data.limit})`;
                }

                container.innerHTML += `
                    <button onclick="tryJoinRoom('${id}')" ${disabled ? 'disabled' : ''} 
                        class="${btnClass} p-5 rounded-2xl shadow-xl transition flex flex-col items-center justify-center space-y-2 border border-white/10">
                        <span class="text-2xl font-black">חדר ${i}</span>
                        <span class="text-xs font-bold bg-black/30 px-2 py-1 rounded-full uppercase tracking-tighter">${statusText}</span>
                    </button>`;
            }
        }

        window.tryJoinRoom = async (roomId) => {
            currentRoomId = roomId;
            const roomsCol = `teacher_${teacherCode}_rooms`;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', roomsCol, roomId);
            showToast("מתחבר לחדר...");
            try {
                const docSnap = await getDoc(roomRef);
                const pObj = { uid: user.uid, name: playerName, score: 0, ready: true };
                if (!docSnap.exists() || docSnap.data().status === 'empty') {
                    await setDoc(roomRef, { limit: roomLimit, status: 'waiting', players: [pObj] });
                } else {
                    const data = docSnap.data();
                    const exists = (data.players || []).some(p => p.uid === user.uid);
                    if (!exists) {
                        await updateDoc(roomRef, { players: arrayUnion(pObj) });
                    }
                }
                showScreen('waiting-screen');
                listenToCurrentRoom();
            } catch (err) { showToast("שגיאת הרשאות!"); }
        };

        function listenToCurrentRoom() {
            const roomsCol = `teacher_${teacherCode}_rooms`;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', roomsCol, currentRoomId);
            if (roomUnsubscribe) roomUnsubscribe();
            
            roomUnsubscribe = onSnapshot(roomRef, (docSnap) => {
                const data = docSnap.data();
                if (!data || !data.players) return;
                
                const myPlayerData = data.players.find(p => p.uid === user.uid);
                if (!myPlayerData) return; 

                document.getElementById('waiting-players').innerHTML = data.players.map(p => `
                    <div class="bg-white/10 p-4 rounded-2xl flex justify-between items-center">
                        <span class="text-4xl">${p.name}</span>
                        <span class="text-emerald-400 font-bold">מוכן! ✅</span>
                    </div>`).join('');
                document.getElementById('wait-count').innerText = `${data.players.length}/${data.limit}`;
                
                if (data.players.length >= data.limit && data.status === 'waiting') {
                    const endTime = Date.now() + (120 * 1000); 
                    updateDoc(roomRef, { status: 'playing', endTime: endTime });
                }

                if (data.status === 'playing' && data.endTime) {
                    if (!gameActive) {
                        startGameUI();
                        startSyncedTimer(data.endTime);
                        listenToScores();
                    }
                }
            });
        }

        function startSyncedTimer(targetEndTime) {
            score = 0;
            gameActive = true;
            gameSequence = [];
            userSequence = [];
            document.getElementById('score-val').innerText = '0';
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                const now = Date.now();
                const remaining = Math.max(0, Math.floor((targetEndTime - now) / 1000));
                document.getElementById('timer-val').innerText = remaining;
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    finishGame();
                }
            }, 500);
            nextStep();
        }

        function listenToScores() {
            const roomsCol = `teacher_${teacherCode}_rooms`;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', roomsCol, currentRoomId);
            onSnapshot(roomRef, (docSnap) => {
                const data = docSnap.data();
                if (data?.players) {
                    const sorted = [...data.players].sort((a, b) => b.score - a.score);
                    document.getElementById('leaderboard-list').innerHTML = sorted.map((p, i) => `
                        <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl mb-2 border-r-4 ${p.uid === user?.uid ? 'border-yellow-400 bg-white/10' : 'border-transparent'}">
                            <span class="text-2xl">${i+1}. ${p.name}</span>
                            <span class="font-black text-xl">${p.score}</span>
                        </div>`).join('');
                }
            });
        }

        async function syncScore() {
            if(!user || !currentRoomId) return;
            const roomsCol = `teacher_${teacherCode}_rooms`;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', roomsCol, currentRoomId);
            const docSnap = await getDoc(roomRef);
            if (docSnap.exists()) {
                const players = docSnap.data().players.map(p => {
                    if (p.uid === user.uid) p.score = score;
                    return p;
                });
                await updateDoc(roomRef, { players });
            }
        }

        function startSingleGame() {
            score = 0; gameActive = true; gameSequence = []; userSequence = [];
            document.getElementById('score-val').innerText = '0';
            nextStep();
        }

        async function finishGame() {
            if (timerInterval) clearInterval(timerInterval);
            gameActive = false;
            canClick = false;
            showScreen('results-screen');
            document.getElementById('final-score').innerText = score;
            saveHighScore();
        }

        async function saveHighScore() {
            if (!teacherCode || !db || !user) return;
            const scoreCol = `teacher_${teacherCode}_scores`;
            const scoreId = `${user.uid}_${Date.now()}`;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', scoreCol, scoreId), {
                name: playerName, score: score, timestamp: Date.now()
            });
            loadHighScores();
        }

        // תיקון מנגנון "שחק שוב" למשחק קבוצתי
        window.retryGame = async () => {
            if (gameMode === 'single') { 
                startGameUI(); 
                startSingleGame(); 
            } else {
                showToast("חוזר להגדרות חדר...");
                await leaveCurrentRoomSilent(); // צא מהחדר הישן ב-Firebase
                showScreen('setup-screen'); // חזור למסך ההגדרות לבחירת כמות שחקנים
            }
        };

        // חזרה לתפריט הראשי - מאפס הכל
        window.goHome = async () => {
            await leaveCurrentRoomSilent();
            location.reload();
        }

        window.openLeaderboardDirectly = () => {
            teacherCode = document.getElementById('teacher-input-home').value.trim().toUpperCase();
            if (!teacherCode) { showToast("נא להזין קוד מורה"); return; }
            loadHighScores();
            showScreen('leaderboard-only-screen');
        };

        function loadHighScores() {
            if (!db) return;
            const scoreCol = `teacher_${teacherCode}_scores`;
            const q = collection(db, 'artifacts', appId, 'public', 'data', scoreCol);
            onSnapshot(q, (snapshot) => {
                let all = []; snapshot.forEach(d => all.push(d.data()));
                all.sort((a, b) => b.score - a.score);
                const html = all.slice(0, 10).map((s, i) => `
                    <div class="flex justify-between items-center p-4 border-b border-white/10">
                        <span class="text-3xl">${i+1}. ${s.name}</span>
                        <span class="font-black text-emerald-400 text-2xl">${s.score}</span>
                    </div>`).join('') || '<p class="text-center py-8 text-slate-500 font-bold">אין עדיין שיאים</p>';
                document.getElementById('high-scores-list').innerHTML = html;
                document.getElementById('global-high-scores-list').innerHTML = html;
            });
        }

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg; t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 3000);
        };

        function updateGameMsg(msg) {
            const el = document.getElementById('game-msg');
            if(el) el.innerText = msg;
        }

    </script>
    <style>
        .simon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 320px; height: 320px; }
        .pad { border-radius: 35px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0.8; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .pad:active { transform: scale(0.92); opacity: 1; }
        #green { background-color: #10b981; }
        #red { background-color: #ef4444; }
        #yellow { background-color: #f59e0b; }
        #blue { background-color: #3b82f6; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        #emoji-grid { max-height: 220px; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center p-4 font-sans selection:bg-emerald-500/30">
    <div id="toast" class="fixed top-8 bg-red-600 text-white px-8 py-4 rounded-2xl opacity-0 transition-opacity pointer-events-none z-50 shadow-2xl font-bold max-w-sm text-center"></div>

    <div id="home-screen" class="screen flex flex-col items-center text-center space-y-12 mt-16 w-full max-w-md">
        <h1 class="text-7xl font-black italic bg-gradient-to-tr from-emerald-400 via-blue-400 to-indigo-500 bg-clip-text text-transparent uppercase tracking-tighter">DUEL COLORS</h1>
        <div class="grid grid-cols-1 gap-6 w-full">
            <button onclick="startSetup('single')" class="bg-slate-800 p-10 rounded-[2.5rem] text-3xl font-black shadow-2xl transition hover:-translate-y-2 border border-slate-700">🙋‍♂️ אימון אישי</button>
            <button onclick="startSetup('group')" class="bg-indigo-600 p-10 rounded-[2.5rem] text-3xl font-black shadow-2xl transition hover:-translate-y-2 border border-indigo-400">⚔️ תחרות קבוצתית</button>
        </div>
        <div class="w-full glass p-8 rounded-[2rem] space-y-6">
            <p class="text-sm text-slate-400 font-black uppercase tracking-widest">צפייה בלוח שיאים</p>
            <div class="flex gap-3">
                <input type="text" id="teacher-input-home" placeholder="קוד מורה" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none uppercase font-mono text-center text-xl focus:ring-2 focus:ring-indigo-500">
                <button onclick="openLeaderboardDirectly()" class="bg-slate-700 px-6 py-4 rounded-2xl font-black hover:bg-slate-600 transition">צפה</button>
            </div>
        </div>
    </div>

    <div id="setup-screen" class="screen hidden flex flex-col items-center space-y-10 mt-12 w-full max-w-md glass p-10 rounded-[3rem]">
        <h2 id="mode-title" class="text-4xl font-black">הגדרות</h2>
        <div class="w-full space-y-8 text-right">
            <div class="space-y-4">
                <label class="block text-sm font-black text-slate-400 uppercase tracking-widest mr-2">בחר חיה לקרב:</label>
                <div id="emoji-grid" class="grid grid-cols-5 gap-3 bg-slate-900/50 p-6 rounded-3xl border border-slate-700 shadow-inner"></div>
            </div>
            <div class="space-y-4">
                <label class="block text-sm font-black text-slate-400 uppercase tracking-widest mr-2">קוד המורה שלך:</label>
                <input type="text" id="teacher-input" placeholder="למשל: MATH101" class="w-full p-5 rounded-2xl bg-slate-900 border border-slate-700 outline-none text-center uppercase font-mono text-2xl focus:ring-2 focus:ring-emerald-500">
            </div>
            <div id="group-config" class="hidden space-y-4">
                <label class="block text-sm font-black text-slate-400 uppercase tracking-widest mr-2">מספר לוחמים בחדר:</label>
                <select id="participant-select" class="w-full p-5 rounded-2xl bg-slate-900 border border-slate-700 outline-none text-center text-xl appearance-none font-bold">
                    <option value="2">2 שחקנים</option>
                    <option value="3">3 שחקנים</option>
                    <option value="4">4 שחקנים</option>
                </select>
            </div>
        </div>
        <button onclick="validateAndProceed()" class="w-full bg-emerald-600 p-6 rounded-[2rem] text-3xl font-black shadow-2xl transition active:scale-95 border-b-4 border-emerald-800">המשך</button>
        <button onclick="goHome()" class="text-slate-500 text-sm font-bold hover:text-white transition w-full text-center">ביטול וחזרה</button>
    </div>

    <div id="rooms-screen" class="screen hidden flex flex-col items-center space-y-10 mt-10 w-full max-w-3xl">
        <h2 class="text-5xl font-black tracking-tighter text-center">בחירת זירה</h2>
        <div id="rooms-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6 w-full mt-4"></div>
        <button onclick="showScreen('setup-screen')" class="text-slate-500 font-bold hover:text-white transition mt-8">חזרה להגדרות</button>
    </div>

    <div id="waiting-screen" class="screen hidden flex flex-col items-center space-y-12 mt-16 w-full max-w-md glass p-12 rounded-[4rem] text-center">
        <div class="w-32 h-32 border-8 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin mx-auto"></div>
        <h2 class="text-4xl font-black">ממתינים...</h2>
        <p class="text-7xl font-black text-emerald-400" id="wait-count">1/4</p>
        <div id="waiting-players" class="w-full space-y-4 text-right"></div>
        <button onclick="goHome()" class="text-rose-400 font-bold hover:text-rose-300 transition">ביטול ויציאה</button>
    </div>

    <div id="game-screen" class="screen hidden flex flex-col items-center space-y-10 w-full max-w-5xl">
        <div class="flex justify-between w-full bg-slate-900/80 p-8 rounded-[3rem] border border-slate-800 shadow-2xl items-center">
            <div id="timer-container" class="flex items-center gap-4 bg-black/20 px-6 py-4 rounded-3xl">
                <span class="text-4xl">⏱️</span>
                <div class="text-5xl font-mono font-black text-red-400" id="timer-val">120</div>
            </div>
            <div class="text-8xl font-black text-emerald-400 drop-shadow-lg" id="score-val">0</div>
            <div class="flex items-center gap-6">
                <button onclick="goHome()" class="bg-rose-900/60 text-rose-100 px-6 py-3 rounded-2xl text-lg font-black border border-rose-500/30 transition hover:bg-rose-800">יציאה</button>
                <div id="p-name-disp" class="text-5xl bg-white/5 p-4 rounded-full border border-white/10">🐶</div>
            </div>
        </div>
        <div class="flex flex-col lg:flex-row gap-16 items-center lg:items-start w-full justify-center">
            <div class="flex flex-col items-center space-y-8">
                <div class="simon-grid">
                    <div id="green" class="pad" onclick="handlePadClick('green')"></div>
                    <div id="red" class="pad" onclick="handlePadClick('red')"></div>
                    <div id="yellow" class="pad" onclick="handlePadClick('yellow')"></div>
                    <div id="blue" class="pad" onclick="handlePadClick('blue')"></div>
                </div>
                <div id="game-msg" class="text-3xl font-black text-indigo-300 h-10 animate-bounce text-center">התכונן...</div>
            </div>
            <div id="side-scores" class="w-full max-w-sm glass p-8 rounded-[3rem] hidden self-stretch min-h-[400px]">
                <h3 class="text-2xl font-black mb-6 border-b border-white/10 pb-4 flex items-center gap-2">🏆 <span>זמן אמת</span></h3>
                <div id="leaderboard-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="results-screen" class="screen hidden flex flex-col items-center space-y-12 mt-12 w-full max-w-md text-center">
        <div class="glass p-12 rounded-[4.5rem] border-b-[12px] border-emerald-600 w-full shadow-2xl">
            <h2 class="text-5xl font-black uppercase tracking-tighter mb-4">הסתיים!</h2>
            <div class="text-9xl font-black text-emerald-400 py-10" id="final-score">0</div>
            <div class="flex flex-col gap-5">
                <button onclick="retryGame()" class="bg-emerald-600 p-6 rounded-[2rem] text-3xl font-black shadow-xl hover:bg-emerald-500 transition active:scale-95 border-b-4 border-emerald-800">שחק שוב</button>
                <button onclick="goHome()" class="bg-white text-slate-900 p-6 rounded-[2rem] text-3xl font-black shadow-xl hover:bg-slate-200 transition active:scale-95">תפריט ראשי</button>
            </div>
        </div>
        <div class="w-full glass p-10 rounded-[3rem] text-right">
            <h3 class="text-2xl font-black text-center mb-6 border-b border-white/10 pb-4">🏆 עשרת הגדולים</h3>
            <div id="high-scores-list" class="space-y-2"></div>
        </div>
    </div>

    <div id="leaderboard-only-screen" class="screen hidden flex flex-col items-center space-y-10 mt-16 w-full max-w-md text-right">
        <div class="glass p-10 rounded-[4rem] w-full shadow-2xl">
            <h2 class="text-4xl font-black text-center mb-8 border-b border-white/10 pb-6 italic">HALL OF FAME</h2>
            <div id="global-high-scores-list" class="space-y-3"></div>
        </div>
        <button onclick="goHome()" class="bg-slate-800 px-12 py-5 rounded-[2rem] font-black text-2xl transition">חזרה</button>
    </div>
</body>
</html>
